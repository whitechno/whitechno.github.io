<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.title != site.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  {% unless page.url == "/" %}
  <header class="site-header">
    <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
  </header>
  {% endunless %}
  <main>
    {{ content }}
  </main>
  <footer class="site-footer">
    <a href="https://github.com/whitechno">GitHub</a> ·
    <a href="https://www.linkedin.com/in/olegwhite/">LinkedIn</a> ·
    <a href="https://x.com/whitechnoleg">X</a>
  </footer>
</body>
</html>
